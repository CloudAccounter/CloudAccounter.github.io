<!doctype html>
<html lang="en" style="padding: 0px; margin: 0px">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0px;
      }
    </style>
    <script
      type="text/javascript"
      src="src/utility-functions/google-sheet-api.js"
    ></script>
    <script
      type="text/javascript"
      src="src/utility-functions/utilities.js"
    ></script>
    <script
      type="text/javascript"
      src="https://code.jquery.com/jquery-3.6.4.min.js"
    ></script>
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"
    ></script>
    <link
      href="https://fonts.googleapis.com/css?family=Lato&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css"
      rel="stylesheet"
    />
    <link href="index.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Poppins"
      rel="stylesheet"
    />

    <link href="https://fonts.googleapis.com/css2?family=Plus Jakarta+Sans" />
    <link href="https://fonts.googleapis.com/css2?family= AnekKannada" />
    <link href="https://fonts.googleapis.com/css2?family=Urbanist" />
    <link
      href="'https://fonts.googleapis.com/css?family=Manrope' rel='stylesheet'>"
    />
    <link
      href="https://fonts.googleapis.com/css?family=DM Sans"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Urbanist"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Manrope"
      rel="stylesheet"
    />
  </head>

  <body style="margin: 0px; padding: 0px">
    <!-- Premium Global Header -->
    <header class="app-header">
      <div class="header-left">
        <div id="side-menu" class="options-button" onclick="toggleDropdown()">
          <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="dropdown-menu" id="dropdown">
            <button
              onclick="
                loadPage('transaction');
                selectedAccount = {};
              "
              class="tabButton"
            >
              <i class="fas fa-list fa-fw"></i> All Transactions
            </button>
            <button onclick="loadPage('addExpense')" class="tabButton">
              <i class="fas fa-arrow-up fa-fw" style="color: #dc3545"></i> Add
              Expense
            </button>
            <button onclick="loadPage('addIncome')" class="tabButton">
              <i class="fas fa-arrow-down fa-fw" style="color: #28a745"></i> Add
              Income
            </button>
            <button onclick="loadPage('addTransfer')" class="tabButton">
              <i class="fas fa-exchange-alt fa-fw" style="color: #007bff"></i>
              Transfer
            </button>
            <div class="dropdown-divider"></div>
            <button onclick="logout()" class="tabButton logout-btn">
              <i class="fas fa-sign-out-alt fa-fw"></i> Log Out
            </button>
          </div>
        </div>
      </div>

      <div class="header-center">
        <a onclick="loadPage('ledgerSummary')" class="logo">
          <img src="src/img/logo.png" alt="logo" width="40px" />
        </a>
      </div>

      <div class="header-right">
        <a class="back-btn" onclick="goBack()" title="Go Back">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
      </div>
    </header>
    <div class="main-content" id="main-content"></div>
    <div id="login"></div>
    <script type="text/javascript" src="data.js"></script>
    <script type="text/javascript" src="main-routes.js"></script>
    <script type="text/javascript" src="index.js"></script>
  </body>
</html>
