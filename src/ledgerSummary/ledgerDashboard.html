<div class="dashboard-wrapper">
  <!-- Header -->
  <header class="dashboard-header">
    <div class="greeting-container">
      <h1 class="greeting">Overview</h1>
    </div>
  </header>

  <!-- Accounts List -->
  <section class="widget-card">
    <!-- <div class="widget-header">
      <h3><i class="fas fa-users account-icon-header"></i> Ledger Accounts</h3>
      <div class="dots"><i class="fas fa-ellipsis-h"></i></div>
    </div> -->
    <div class="accounts-list" id="ledger-account-balances">
      <!-- Generated via JS -->
      <div
        style="text-align: center; color: #999; font-size: 14px; padding: 20px"
      >
        <i class="fas fa-spinner fa-spin"></i> Loading accounts...
      </div>
    </div>
  </section>


    <!-- Quick Actions: Add Account & Add Ledger -->
  <div class="two-col-grid" >
    <!-- Add Account Card -->
    <section
      class="widget-card"
      onclick="loadPage('addAccount')"
      style="
        cursor: pointer;
        text-align: center;
        border: 2px solid transparent;
        transition: all 0.3s;
        padding: 24px 16px;
      "
      onmouseover="
        this.style.borderColor = '#4a71e8';
        this.style.transform = 'translateY(-2px)';
      "
      onmouseout="
        this.style.borderColor = 'transparent';
        this.style.transform = 'translateY(0)';
      "
    >
      <div
        class="account-icon-wrap"
        style="
          color: #4a71e8;
          background: rgba(74, 113, 232, 0.1);
          width: 56px;
          height: 56px;
          font-size: 24px;
          margin: 0 auto 12px;
          display: flex;
          align-items: center;
          justify-content: center;
          border-radius: 14px;
        "
      >
        <i class="fas fa-plus-circle"></i>
      </div>
      <h3
        style="
          font-size: 16px;
          font-weight: 600;
          color: #1a1b25;
          margin-bottom: 6px;
        "
      >
        Add Account
      </h3>
      <p style="font-size: 12px; color: #6c757d; margin: 0">
        Create a new account
      </p>
    </section>

    <!-- Add Ledger Card -->
    <section
      class="widget-card"
      onclick="loadPage('addLedger')"
      style="
        cursor: pointer;
        text-align: center;
        border: 2px solid transparent;
        transition: all 0.3s;
        padding: 24px 16px;
      "
      onmouseover="
        this.style.borderColor = '#34c759';
        this.style.transform = 'translateY(-2px)';
      "
      onmouseout="
        this.style.borderColor = 'transparent';
        this.style.transform = 'translateY(0)';
      "
    >
      <div
        class="account-icon-wrap"
        style="
          color: #34c759;
          background: rgba(52, 199, 89, 0.1);
          width: 56px;
          height: 56px;
          font-size: 24px;
          margin: 0 auto 12px;
          display: flex;
          align-items: center;
          justify-content: center;
          border-radius: 14px;
        "
      >
        <i class="fas fa-book-medical"></i>
      </div>
      <h3
        style="
          font-size: 16px;
          font-weight: 600;
          color: #1a1b25;
          margin-bottom: 6px;
        "
      >
        Add Ledger
      </h3>
      <p style="font-size: 12px; color: #6c757d; margin: 0">
        Create a new ledger
      </p>
    </section>
  </div>
  <div style="height: 80px"></div>
</div>
