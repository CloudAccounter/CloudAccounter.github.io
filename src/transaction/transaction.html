<div class="dashboard-wrapper">
  <!-- Header -->
  <!-- <header
    class="dashboard-header"
    style="justify-content: center; text-align: center"
  >
    <div class="greeting-container" style="width: 100%">
      <h1 class="greeting">All Transactions</h1>
    </div>
  </header> -->

  <!-- Filter Widget -->
  <section
    class="widget-card"
    style="margin-bottom: 20px; display: none"
    id="transaction-filter-card"
  >
    <div
      id="transaction-filter"
      style="
        display: flex;
        gap: 10px;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
      "
    >
      <div class="month-selector" style="width: auto; margin-right: 10px">
        <!-- The original HTML used a custom dropdown: -->
        <div class="period-dropdown" style="width: 100%">
          <button
            class="period-dropdown-btn month-selector-input"
            id="periodDropdownBtn"
            style="
              background: transparent;
              color: #495057;
              border: none;
              padding: 0;
              display: flex;
              align-items: center;
              justify-content: center;
              width: 100%;
            "
          >
            <span id="periodSelectedValue">Month</span>
            <span class="period-dropdown-icon">▼</span>
          </button>
          <div
            class="period-dropdown-menu"
            id="periodDropdownMenu"
            style="
              position: absolute;
              background: white;
              border-radius: 8px;
              box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
              padding: 8px;
              z-index: 100;
              margin-top: 10px;
            "
          >
            <a
              href="#"
              data-value="Week"
              style="
                display: block;
                padding: 8px;
                text-decoration: none;
                color: #333;
                border-radius: 4px;
                border-bottom: 1px solid #f1f3f5;
              "
              >Week</a
            >
            <a
              href="#"
              data-value="Month"
              style="
                display: block;
                padding: 8px;
                text-decoration: none;
                color: #333;
                border-radius: 4px;
                border-bottom: 1px solid #f1f3f5;
              "
              >Month</a
            >
            <a
              href="#"
              data-value="Day"
              style="
                display: block;
                padding: 8px;
                text-decoration: none;
                color: #333;
                border-radius: 4px;
              "
              >Day</a
            >
          </div>
        </div>
      </div>

      <div style="display: flex; gap: 10px; align-items: center">
        <div
          id="prevDate"
          class="dots"
          title="Previous Date"
          style="
            font-size: 16px;
            width: 30px;
            text-align: center;
            cursor: pointer;
          "
        >
          <i class="fas fa-chevron-left"></i>
        </div>
        <input
          type="date"
          id="datePicker"
          class="month-selector-input"
          style="
            width: auto;
            background: #f8f9fa;
            padding: 4px 8px;
            border-radius: 6px;
            text-align: center;
          "
        />
        <div
          id="nextDate"
          class="dots"
          title="Next Date"
          style="
            font-size: 16px;
            width: 30px;
            text-align: center;
            cursor: pointer;
          "
        >
          <i class="fas fa-chevron-right"></i>
        </div>
      </div>
    </div>
  </section>

  <!-- Transactions List -->
  <section class="widget-card" style="padding: 16px">
    <div class="widget-header">
      <h3>
        <i class="fas fa-list" style="color: #4a71e8"></i>
        <span id="transaction-title">Transactions List</span>
      </h3>
    </div>
    <div
      class="transactions-list"
      id="transaction-list"
      style="padding-top: 8px"
    >
      <!-- Generated via JS -->
    </div>
  </section>

  <div style="height: 80px"></div>
</div>
